events { 
    worker_connections 1024; 
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # 1. Frontend & Static Files (React)
        location / {
            proxy_pass http://app:3000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Support for WebSockets (HMR)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 2. AI API Proxy (Ollama)
        location /ai-api/ {
            # Rewrite to remove /ai-api prefix before sending to ollama
            proxy_pass http://ollama:11434/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Increase timeouts for AI generation
	    #proxy_read_timeout 300s;
	    #proxy_connect_timeout 300s;
	    #proxy_send_timeout 300s;
	    
	    # Timeouts
		proxy_read_timeout 900s;
		proxy_connect_timeout 90s;
    		proxy_send_timeout 90s;

    		# Streaming support
    		proxy_buffering off;
    		proxy_cache off;
		chunked_transfer_encoding on;
    		proxy_http_version 1.1;
    		proxy_set_header Connection "";

            # Basic CORS for the proxy endpoint
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range' always;
            
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }
        }
    }
}
