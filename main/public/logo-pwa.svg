<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#006399;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#004a73;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#bg-gradient)"/>
  
  <!-- Outer Pulse Ring (CinX style) -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="12"/>
  
  <!-- Main Symbol: Cinema Reel combined with Robot Eye -->
  <g transform="translate(128, 128) scale(0.5)">
    <!-- Film Reel Outer -->
    <path d="M256,32C132.3,32,32,132.3,32,256s100.3,224,224,224s224-100.3,224-224S379.7,32,256,32z M256,432c-97,0-176-79-176-176 S159,80,256,80s176,79,176,176S353,432,256,432z" fill="#FFFFFF"/>
    
    <!-- Spindles / Robot Eye Iris -->
    <circle cx="256" cy="256" r="60" fill="#FFFFFF"/>
    
    <!-- Reel Holes -->
    <circle cx="256" cy="140" r="24" fill="#FFFFFF"/>
    <circle cx="256" cy="372" r="24" fill="#FFFFFF"/>
    <circle cx="140" cy="256" r="24" fill="#FFFFFF"/>
    <circle cx="372" cy="256" r="24" fill="#FFFFFF"/>
    
    <!-- Play Triangle (Center) -->
    <path d="M240,230l40,26l-40,26V230z" fill="#006399"/>
  </g>
  
  <!-- Glossy Reflection -->
  <path d="M256,16c132.5,0,240,107.5,240,240c0-132.5-107.5-240-240-240S16,123.5,16,256C16,123.5,123.5,16,256,16z" fill="white" opacity="0.1"/>
</svg>