services:
  app:
    build: 
      context: .
      dockerfile: dockerfile
    container_name: cinx-web
    # REMOVED: ports mapping to keep it internal
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    stdin_open: true
    tty: true
    restart: unless-stopped
    networks:
      - cinx-network

  ollama:
    image: docker.io/ollama/ollama:latest
    container_name: cinx-ai
    # REMOVED: ports mapping to keep it internal
    environment:
      - OLLAMA_ORIGINS=*
      - OLLAMA_KEEP_ALIVE=-1
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - cinx-network
    restart: unless-stopped

  nginx:
    image: docker.io/library/nginx:alpine
    container_name: cinx-proxy
    ports:
      - "8080:80" # Using 8080 for rootless Podman compatibility
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - cinx-network
    depends_on:
      - app
      - ollama
    restart: unless-stopped

volumes:
  node_modules:
  ollama_data:

networks:
  cinx-network:
    driver: bridge
